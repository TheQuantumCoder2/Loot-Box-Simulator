<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loot Box Simulator - Desmitificando la Probabilidad</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Loot Box Simulator</h1>
            <p class="subtitle">"Si compras muchas, ¿seguro ganas?" — Vamos a comprobarlo.</p>
        </header>

        <section class="stats-panel">
            <div class="stat-card">
                <span class="stat-label">Fichas Disponibles</span>
                <span id="chips-count" class="stat-value">1000</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Mazos Comprados</span>
                <span id="packs-count" class="stat-value">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Cartas Reveladas</span>
                <span id="cards-count" class="stat-value">0</span>
            </div>
        </section>

        <main class="game-area">
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
                <span id="progress-text">Esperando apertura...</span>
            </div>

            <div id="loot-box-container" class="loot-box-container">
                <div id="loot-box" class="loot-box">
                    <div class="box-face box-front">?</div>
                    <div class="box-face box-back"></div>
                    <div class="box-face box-top"></div>
                    <div class="box-face box-bottom"></div>
                    <div class="box-face box-left"></div>
                    <div class="box-face box-right"></div>
                </div>
                <div id="card-reveal" class="card-reveal hidden">
                    <div class="card-inner">
                        <div class="card-rarity" id="card-rarity-text">RARIDAD</div>
                        <div class="card-name" id="card-name-text">Nombre de la Carta</div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-buy-1" class="btn btn-primary">
                    <span class="btn-title">Abrir 1 Mazo</span>
                    <span class="btn-cost">10 Fichas</span>
                </button>
                <button id="btn-buy-10" class="btn btn-secondary">
                    <span class="btn-title">Abrir 10 Mazos</span>
                    <span class="btn-cost">90 Fichas</span>
                </button>
            </div>
        </main>

        <section class="history-panel">
            <h3>Historial Reciente</h3>
            <div id="history-grid" class="history-grid">
                <!-- Las cartas se añadirán aquí dinámicamente -->
            </div>
        </section>

        <div id="overlay" class="overlay hidden">
            <div class="modal">
                <h2 id="modal-title">¡Resultados!</h2>
                <p id="modal-message"></p>
                <button id="btn-restart" class="btn btn-restart">Intentar de nuevo</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
